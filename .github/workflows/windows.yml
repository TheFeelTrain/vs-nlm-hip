name: Build (Windows)

on:
  push:
    paths:
      - 'CMakeLists.txt'
      - 'source/*'
      - '.github/workflows/windows.yml'
      - '.github/actions/setup-hip-windows/**'
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        type: string
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-2025

    defaults:
      run:
        shell: pwsh

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
        submodules: true
        fetch-depth: 0

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Set up HIP (Windows)
      uses: ./.github/actions/setup-hip-windows
      with:
        hip-version: "26.Q1-Win11"

    - name: Patch ROCm math headers
      shell: pwsh
      run: |
        $rocmRoot = "$env:HIP_PATH"
        Write-Host "Targeting ROCm at: $rocmRoot"

        $mathFwds = Get-ChildItem -Path "$rocmRoot/lib/clang/*/include/__clang_cuda_math_forward_declares.h" | Select-Object -First 1
        $hipCmath = Get-ChildItem -Path "$rocmRoot/lib/clang/*/include/__clang_hip_cmath.h" | Select-Object -First 1

        $regex = '(__DEVICE__\s+(?:__CONSTEXPR__\s+)?bool\s+)(isgreater|isgreaterequal|isless|islessequal|islessgreater|isunordered)\b'
        $replacement = '${1}_disabled_$2'

        if ($mathFwds -and (Test-Path $mathFwds.FullName)) {
            Write-Host "Patching: $($mathFwds.FullName)"
            (Get-Content $mathFwds.FullName) -replace $regex, $replacement | Set-Content $mathFwds.FullName
        } else {
            Write-Warning "Could not find __clang_cuda_math_forward_declares.h"
        }

        if ($hipCmath -and (Test-Path $hipCmath.FullName)) {
            Write-Host "Patching: $($hipCmath.FullName)"
            (Get-Content $hipCmath.FullName) -replace $regex, $replacement | Set-Content $hipCmath.FullName
        } else {
            Write-Warning "Could not find __clang_hip_cmath.h"
        }

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.1.0

    - name: Set up Ninja
      run: pip install ninja

    - name: Download VapourSynth headers
      run: |
        curl -s -o vs.zip -L https://github.com/vapoursynth/vapoursynth/archive/refs/tags/R57.zip
        unzip -q vs.zip
        mv vapoursynth-*/ vapoursynth/

    - name: Configure CMake
      shell: pwsh
      run: |
        cmake -S . -B build -G Ninja `
        -D CMAKE_BUILD_TYPE=Release `
        -D VS_INCLUDE_DIR="$PWD\vapoursynth\include" `
        -D CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
        -D CMAKE_CXX_COMPILER="$env:HIP_PATH\bin\clang++.exe" `
        -D CMAKE_HIP_ARCHITECTURES="gfx1010;gfx1011;gfx1012;gfx1030;gfx1031;gfx1032;gfx1033;gfx1034;gfx1035;gfx1036;gfx1100;gfx1101;gfx1102;gfx1103;gfx1200;gfx1201"

    - name: Build
      run: cmake --build build --verbose

    - name: Install
      run: cmake --install build --prefix install

    - name: Build wheel
      run: uv build --wheel

    - name: Upload wheel
      uses: actions/upload-artifact@v7
      with:
        name: wheel-windows
        path: dist/*.whl
